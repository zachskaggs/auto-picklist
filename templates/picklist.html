{% extends "base.html" %}
{% block content %}
<div class="header">
  <div class="title header-hideable">Batch: {{ batch.name }}</div>
  <div class="header-right">
    <div class="name-box header-hideable">
      <label class="name-label" for="user-name">Name</label>
      <input id="user-name" class="input name-input" type="text" value="anonymous" />
    </div>
    <div id="batch-counts" class="header-counts" data-url="/batch/{{ batch.id }}/counts" hx-get="/batch/{{ batch.id }}/counts" hx-trigger="load">
      Loading...
    </div>
    <div id="scoreboard" class="header-counts scoreboard-panel" onclick="this.classList.toggle('scoreboard-open')">
      <strong>Scoreboard</strong>
      <div class="scoreboard-body" id="scoreboard-body"></div>
    </div>
    <form id="filters" class="filters header-filters" hx-get="/batch/{{ batch.id }}/items" hx-target="#items" hx-trigger="change, keyup changed delay:400ms">
      <input type="hidden" name="picker_name" id="picker-name-hidden" value="anonymous" />
      <label><input type="checkbox" name="show_picked" value="1" /> Show picked</label>
      <label><input type="checkbox" name="show_missing" value="1" /> Show missing only</label>
      <label><input type="checkbox" name="show_all" value="1" /> Show all</label>
      <label>Sort
        <select name="sort_by">
          <option value="set">Set A→Z</option>
          <option value="set_desc">Set Z→A</option>
          <option value="value">Card value</option>
        </select>
      </label>
      {% if available_sets %}
      <div class="set-filter-row">
        <span class="set-filter-label">Sets</span>
        {% for code in available_sets %}
        <label class="set-chip"><input type="checkbox" name="set_filter" value="{{ code }}" /><span>{{ code|upper }}</span></label>
        {% endfor %}
      </div>
      {% endif %}
    </form>
    <div class="header-actions header-hideable">
      <a class="btn" href="/batch/{{ batch.id }}/assisted-pick">Assisted pick</a>
      <a class="btn secondary" href="/">Back to batches</a>
      <a class="btn secondary" href="/batch/{{ batch.id }}/events">Audit log</a>
      <a class="btn secondary" href="/batch/{{ batch.id }}/missing">Missing</a>
      <form method="post" action="/batch/{{ batch.id }}/close" style="display:inline;">
        <button class="btn danger" type="submit">Close batch</button>
      </form>
    </div>
  </div>
</div>

<div id="items" class="panel" data-url="/batch/{{ batch.id }}/items" data-batch-id="{{ batch.id }}" hx-get="/batch/{{ batch.id }}/items" hx-trigger="load">
  <div style="padding: 16px;">
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
  </div>
</div>

<div id="card-modal"></div>

<script>
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    const trigger = evt.detail.xhr.getResponseHeader('HX-Trigger');
    if (trigger && trigger.includes('batch-counts-changed')) {
      htmx.trigger(document.body, 'batch-counts-changed');
    }
  });
</script>
{% endblock %}
